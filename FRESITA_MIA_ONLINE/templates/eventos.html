<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Eventos | Fresita Mía</title>
    <link rel="stylesheet" href="/static/css/estilos.css">
</head>
<body>

<header>
    <h1>🍓 Fresita Mía</h1>
    <nav>
        <a href="/">Inicio</a>
        <a href="/menu">Menú</a>
        <a href="/carrito">Carrito</a>
        <a href="/eventos">Eventos</a>
    </nav>
</header>

<section class="hero">
    <h2>Eventos especiales</h2>
    <p>Solicita una cotización para tu evento.</p>
</section>

<section class="formulario">
    <form>
        <input type="text" placeholder="Nombre completo">
        <input type="tel" placeholder="Teléfono">
        <input type="date">
        <input type="time">
        <input type="number" placeholder="Número de personas">
        <input type="text" placeholder="Ubicación del evento">
        <input type="text" placeholder="Producto que deseas comprar">
        <textarea placeholder="Comentarios adicionales"></textarea>

        <button type="submit">Solicitar cotización</button>
    </form>
</section>

</body>
</html>
