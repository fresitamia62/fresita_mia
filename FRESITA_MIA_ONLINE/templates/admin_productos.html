<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <title>Administrar Productos</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/estilos.css') }}">

</head>

<body class="detalle-body">

<div class="detalle-contenedor">

    <div class="detalle-header">

        <h1>🍓 Administrar Productos</h1>

        <a href="/admin" class="btn-regresar">
            ⬅ Volver al Panel
        </a>

    </div>

    <div class="productos-admin">

        {% for producto in productos %}

        <div class="producto-admin-card">

            <img src="{{ url_for('static', filename='Imagenes/' + producto[4]) }}">

            <h2>{{ producto[1] }}</h2>

            <p>{{ producto[2] }}</p>

            <h3>${{ producto[3] }}</h3>

            {% if producto[9] %}

                <span class="disponible">
                    🟢 Disponible
                </span>

            {% else %}

                <span class="agotado">
                    🔴 Agotado
                </span>

            {% endif %}

            <br><br>

            <button class="editar-btn">
                ✏ Editar
            </button>

        </div>

        {% endfor %}

    </div>

</div>

</body>

</html>
